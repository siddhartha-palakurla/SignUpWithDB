<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="edit-card">

    <h2>Edit User</h2>

    <input
        type="text"
        id="userName"
        placeholder="User Name">

    <input
        type="number"
        id="age"
        placeholder="Age">

    <input
        type="text"
        id="phone"
        placeholder="Phone Number">

    <button id="updateBtn">
        Update User
    </button>

</div>

<script src="edit.js"></script>

</body>
</html>
